name: Terraform Azure CI/CD (Lock Safe)

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest


    concurrency:
      group: terraform-azure
      cancel-in-progress: true

    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

     
      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=5m

      - name: Terraform Validate
        run: terraform validate


      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=5m

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -lock-timeout=5m
